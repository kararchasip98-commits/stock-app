<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جرد المستودع</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-2:#1f232c;
    --line:#2a2f3a;
    --text:#eef0f4;
    --muted:#8a90a0;
    --accent:#ff8a3d;
    --accent-soft:#ff8a3d22;
    --good:#4ade80;
    --warn:#facc15;
    --bad:#f87171;
    --radius:14px;
    --mono:'Courier New', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Tahoma','Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  }

  /* ---------- LOGIN ---------- */
  .login-wrap{
    width:100%;
    max-width:380px;
    text-align:center;
  }
  .login-wrap h1{
    font-size:1.4rem;
    font-weight:700;
    margin-bottom:6px;
    letter-spacing:.5px;
  }
  .login-wrap p{
    color:var(--muted);
    font-size:.9rem;
    margin-bottom:28px;
  }
  .code-input{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
    font-size:1.6rem;
    text-align:center;
    letter-spacing:8px;
    color:var(--text);
    font-family:var(--mono);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }
  .code-input:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  .login-btn{
    width:100%;
    margin-top:14px;
    padding:14px;
    border:none;
    border-radius:var(--radius);
    background:var(--accent);
    color:#1a1206;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:transform .12s, opacity .2s;
  }
  .login-btn:active{ transform:scale(.98); }
  .error-msg{
    margin-top:14px;
    color:var(--bad);
    font-size:.85rem;
    min-height:1.2em;
    opacity:0;
    transition:opacity .2s;
  }
  .error-msg.show{ opacity:1; }
  .shake{ animation:shake .35s; }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }

  /* ---------- APP ---------- */
  .app{
    width:100%;
    max-width:760px;
    display:none;
  }
  .app.active{ display:block; }

  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
    flex-wrap:wrap;
    gap:12px;
  }
  .user-badge{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .avatar{
    width:46px; height:46px;
    border-radius:12px;
    background:var(--accent);
    color:#1a1206;
    display:flex; align-items:center; justify-content:center;
    font-weight:800;
    font-size:1.2rem;
  }
  .user-info .name{ font-weight:700; font-size:1.05rem; }
  .user-info .sub{ color:var(--muted); font-size:.8rem; }

  .logout-btn{
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--muted);
    border-radius:10px;
    padding:9px 16px;
    font-size:.85rem;
    cursor:pointer;
    transition:.2s;
  }
  .logout-btn:hover{ color:var(--text); border-color:var(--accent); }

  .stats-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
    margin-bottom:16px;
  }
  .stat{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px;
    text-align:center;
  }
  .stat .val{
    font-size:1.4rem;
    font-weight:800;
    font-family:var(--mono);
    color:var(--accent);
  }
  .stat .lbl{
    font-size:.72rem;
    color:var(--muted);
    margin-top:4px;
  }

  .search-box{
    width:100%;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:14px 16px;
    color:var(--text);
    font-size:.95rem;
    margin-bottom:14px;
    outline:none;
    transition:border-color .2s;
  }
  .search-box:focus{ border-color:var(--accent); }

  .table-wrap{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  table{
    width:100%;
    border-collapse:collapse;
  }
  thead th{
    background:var(--panel-2);
    color:var(--muted);
    font-size:.75rem;
    text-transform:uppercase;
    letter-spacing:1px;
    text-align:right;
    padding:12px 16px;
    position:sticky;
    top:0;
  }
  thead th:last-child, tbody td:last-child{ text-align:left; }
  tbody td{
    padding:12px 16px;
    border-top:1px solid var(--line);
    font-size:.9rem;
  }
  tbody tr:hover{ background:var(--panel-2); }
  .qty{
    font-family:var(--mono);
    font-weight:700;
  }
  .qty.zero{ color:var(--bad); }
  .qty.low{ color:var(--warn); }
  .qty.ok{ color:var(--good); }

  .empty{
    text-align:center;
    color:var(--muted);
    padding:30px;
    font-size:.9rem;
  }

  .footer-note{
    text-align:center;
    color:var(--muted);
    font-size:.75rem;
    margin-top:16px;
  }

  @media (max-width:480px){
    .stats-row{ grid-template-columns:1fr 1fr; }
    .stats-row .stat:last-child{ grid-column:span 2; }
    thead th, tbody td{ padding:10px 10px; font-size:.82rem; }
  }
</style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div class="login-wrap" id="loginScreen">
    <h1>جرد المستودع</h1>
    <p>أدخل رمز الدخول الخاص بك للوصول إلى قائمتك</p>
    <input type="password" inputmode="numeric" maxlength="6" class="code-input" id="codeInput" placeholder="••••" autofocus>
    <button class="login-btn" id="loginBtn">دخول</button>
    <div class="error-msg" id="errorMsg">رمز الدخول غير صحيح</div>
  </div>

  <!-- APP SCREEN -->
  <div class="app" id="appScreen">
    <div class="topbar">
      <div class="user-badge">
        <div class="avatar" id="avatarLetter"></div>
        <div class="user-info">
          <div class="name" id="userName"></div>
          <div class="sub">جرد المستودع</div>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">تسجيل خروج</button>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="val" id="statItems">0</div><div class="lbl">عدد المواد</div></div>
      <div class="stat"><div class="val" id="statTotal">0</div><div class="lbl">إجمالي الكمية</div></div>
      <div class="stat"><div class="val" id="statZero">0</div><div class="lbl">مواد نافذة</div></div>
    </div>

    <input type="text" class="search-box" id="searchBox" placeholder="🔍 بحث عن مادة...">

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>اسم المادة</th>
            <th>الكمية</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty" id="emptyMsg" style="display:none;">لا توجد نتائج مطابقة</div>
    </div>

    <div class="footer-note">يتم الترتيب تلقائياً من الأعلى كمية إلى الأقل</div>
  </div>

<script>
const DATA = {
  "1998": {
    name: "كرار",
    items: [
{"name":"ZCNCT3PACK","qty":1537},{"name":"QRESIM","qty":30},{"name":"EZINF2PPPACK","qty":44},{"name":"EZINF2GPPACK","qty":7},{"name":"SIMSWAP","qty":1096},{"name":"FINGER PRINT","qty":38},{"name":"ZCNCTRES2SIM","qty":47},{"name":"ZYARADATA3PACK","qty":6377},{"name":"EZINF2DPACK","qty":1},{"name":"EZYARA15KPACK","qty":6490},{"name":"PHONE","qty":79},{"name":"ZAINFLEXPACK","qty":41967},{"name":"ORYXSIM","qty":666},{"name":"MFES","qty":32},{"name":"EV bulk printer","qty":4},{"name":"EZINF2GPACK","qty":131},{"name":"ZAIN CONNECT","qty":41},{"name":"RZYARADATA2PACK","qty":7926},{"name":"RZYARADATA1PACK","qty":4132},{"name":"Bluetooth Printer","qty":2},{"name":"EZINF2PACK","qty":4724},{"name":"ZCNCTRES1SIM","qty":140},{"name":"EZINF2PPACK","qty":14},{"name":"New Smart Terminal","qty":9},{"name":"zyara","qty":5197},{"name":"ZAINFLEXDPACK","qty":10},{"name":"EZINF2DPPACK","qty":1},{"name":"TABLET","qty":14},{"name":"Zain Prime","qty":109}
    ]
  },
  "2000": {
    name: "عمر",
    items: [
{"name":"RES1-WFM026TSIM3000","qty":15},{"name":"ZAINFi2SIM","qty":122},{"name":"ZF2B535-235ASIM","qty":146},{"name":"RES2-WLTSLT718","qty":33},{"name":"ZF1E5783-230ASIM3000","qty":24},{"name":"WIFSIMM022T","qty":192},{"name":"RES2-ZF2B535-235ASIM","qty":28},{"name":"RES-WLTSLT718","qty":54}
    ]
  },
  "1980": {
    name: "علي",
    items: [
{"name":"RC 5","qty":9871},{"name":"RC 10","qty":8478},{"name":"RC 50","qty":40},{"name":"RC 10G New","qty":25},{"name":"RC 15","qty":404},{"name":"RCBNDL25K","qty":784},{"name":"RCBNDL35K","qty":331},{"name":"RC 5G New","qty":60},{"name":"RC 25","qty":225},{"name":"RCBNDL50K","qty":27},{"name":"RCBNDL12K","qty":12},{"name":"MVD","qty":22820},{"name":"RC 35","qty":265},{"name":"RC100","qty":79}
    ]
  }
};

let currentItems = [];

const loginScreen = document.getElementById('loginScreen');
const appScreen = document.getElementById('appScreen');
const codeInput = document.getElementById('codeInput');
const loginBtn = document.getElementById('loginBtn');
const errorMsg = document.getElementById('errorMsg');
const searchBox = document.getElementById('searchBox');

function tryLogin(){
  const code = codeInput.value.trim();
  const user = DATA[code];
  if(!user){
    errorMsg.classList.add('show');
    loginScreen.querySelector('.code-input').classList.add('shake');
    setTimeout(()=>loginScreen.querySelector('.code-input').classList.remove('shake'), 350);
    codeInput.value = '';
    codeInput.focus();
    return;
  }
  errorMsg.classList.remove('show');
  openApp(user);
}

function openApp(user){
  currentItems = [...user.items].sort((a,b)=> b.qty - a.qty);
  document.getElementById('userName').textContent = user.name;
  document.getElementById('avatarLetter').textContent = user.name.charAt(0);
  document.getElementById('statItems').textContent = currentItems.length;
  document.getElementById('statTotal').textContent = currentItems.reduce((s,i)=>s+i.qty,0).toLocaleString();
  document.getElementById('statZero').textContent = currentItems.filter(i=>i.qty===0).length;
  renderTable(currentItems);
  loginScreen.style.display = 'none';
  appScreen.classList.add('active');
  searchBox.value = '';
}

function renderTable(items){
  const tbody = document.getElementById('tableBody');
  const emptyMsg = document.getElementById('emptyMsg');
  if(items.length === 0){
    tbody.innerHTML = '';
    emptyMsg.style.display = 'block';
    return;
  }
  emptyMsg.style.display = 'none';
  tbody.innerHTML = items.map(i=>{
    let cls = 'ok';
    if(i.qty === 0) cls = 'zero';
    else if(i.qty < 20) cls = 'low';
    return `<tr><td>${escapeHtml(i.name)}</td><td class="qty ${cls}">${i.qty.toLocaleString()}</td></tr>`;
  }).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

loginBtn.addEventListener('click', tryLogin);
codeInput.addEventListener('keydown', e=>{ if(e.key === 'Enter') tryLogin(); });

searchBox.addEventListener('input', ()=>{
  const q = searchBox.value.trim().toLowerCase();
  const filtered = currentItems.filter(i=>i.name.toLowerCase().includes(q));
  renderTable(filtered);
});

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  appScreen.classList.remove('active');
  loginScreen.style.display = 'block';
  codeInput.value = '';
  codeInput.focus();
});
</script>
</body>
</html>
